name: b_tech
description: A clean Flutter frontend for the B Tech mobile app.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  provider: ^6.1.5
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_database: ^12.0.4
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  file_saver: ^0.2.14
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
